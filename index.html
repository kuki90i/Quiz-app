<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: Arial Black, Arial, sans-serif; min-height: 100vh; padding: 20px; }
    .page { display: none; max-width: 800px; margin: 0 auto; }
    .page.active { display: block; }
    .logo { font-size: 42px; font-weight: 900; text-transform: uppercase; color: #D8FF00; letter-spacing: -2px; margin-bottom: 8px; }
    .logo span { color: #fff; }
    .tagline { font-size: 13px; text-transform: uppercase; color: #666; letter-spacing: 3px; margin-bottom: 40px; }
    .btn { display: inline-block; padding: 16px 36px; font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; border: none; border-radius: 30px; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
    .btn:active { transform: scale(0.97); }
    .btn-acid { background: #D8FF00; color: #000; box-shadow: 4px 4px 0px #D8FF00aa; }
    .btn-acid:hover { box-shadow: 6px 6px 0px #D8FF00; }
    .btn-outline { background: transparent; color: #D8FF00; border: 3px solid #D8FF00; }
    .btn-outline:hover { background: #D8FF0011; }
    .btn-ghost { background: transparent; color: #666; border: 3px solid #333; }
    .btn-ghost:hover { border-color: #555; color: #999; }
    .btn-danger { background: transparent; color: #ff4444; border: 3px solid #ff4444; }
    .btn-danger:hover { background: #ff44441a; }
    .card { border: 3px solid #D8FF00; border-radius: 30px; padding: 30px; margin-bottom: 20px; background: #000; }
    .quiz-card { border: 3px solid #D8FF00; border-radius: 30px; padding: 28px 32px; margin-bottom: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: transform 0.15s, background 0.15s; }
    .quiz-card:hover { background: #D8FF0011; transform: translateX(6px); }
    .quiz-card-title { font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
    .quiz-card-meta { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-top: 6px; }
    .quiz-card-arrow { font-size: 28px; color: #D8FF00; font-weight: 900; }
    .quiz-card-del { background: none; border: none; color: #ff4444; font-size: 20px; cursor: pointer; padding: 8px; margin-left: 12px; border-radius: 50%; }
    .quiz-card-del:hover { background: #ff44441a; }
    .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 4px; color: #444; margin-bottom: 20px; margin-top: 40px; }
    input[type="text"] { width: 100%; background: #000; border: 3px solid #333; border-radius: 20px; color: #fff; font-family: Arial Black, Arial, sans-serif; font-size: 16px; font-weight: 700; padding: 18px 24px; outline: none; transition: border-color 0.2s; }
    input[type="text"]:focus { border-color: #D8FF00; }
    input[type="text"]::placeholder { color: #444; font-weight: 400; }
    .q-block { border: 3px solid #222; border-radius: 30px; padding: 28px; margin-bottom: 20px; }
    .q-num { font-size: 11px; text-transform: uppercase; letter-spacing: 4px; color: #555; margin-bottom: 14px; }
    .option-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .option-row input[type="text"] { flex: 1; }
    .correct-btn { width: 44px; height: 44px; border-radius: 50%; border: 3px solid #333; background: transparent; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; font-family: Arial Black, Arial, sans-serif; font-weight: 900; color: #555; }
    .correct-btn.selected { border-color: #D8FF00; background: #D8FF00; color: #000; }
    .correct-btn:not(.selected):hover { border-color: #555; }
    .nav { display: flex; align-items: center; gap: 14px; margin-bottom: 40px; }
    .back-btn { background: none; border: 3px solid #333; color: #666; border-radius: 50px; padding: 10px 22px; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.15s; }
    .back-btn:hover { border-color: #D8FF00; color: #D8FF00; }
    .question-counter { font-size: 12px; text-transform: uppercase; letter-spacing: 4px; color: #555; margin-bottom: 16px; }
    .question-text { font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 40px; color: #fff; }
    .answer-option { border: 3px solid #222; border-radius: 20px; padding: 20px 28px; margin-bottom: 14px; cursor: pointer; font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #fff; transition: all 0.15s; background: #000; width: 100%; text-align: left; }
    .answer-option:hover:not(.disabled) { border-color: #D8FF00; color: #D8FF00; }
    .answer-option.correct { border-color: #D8FF00; background: #D8FF00; color: #000; }
    .answer-option.wrong { border-color: #ff4444; background: #ff44441a; color: #ff4444; }
    .answer-option.disabled { cursor: not-allowed; }
    .progress-wrap { background: #111; border-radius: 30px; height: 6px; margin-bottom: 40px; overflow: hidden; }
    .progress-bar { background: #D8FF00; height: 100%; border-radius: 30px; transition: width 0.4s ease; }
    .score-big { font-size: 90px; font-weight: 900; color: #D8FF00; line-height: 1; letter-spacing: -4px; }
    .score-label { font-size: 13px; text-transform: uppercase; letter-spacing: 4px; color: #555; margin-top: 8px; margin-bottom: 40px; }
    .result-msg { font-size: 32px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 14px; }
    .result-sub { color: #555; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 50px; }
    .stats-strip { display: flex; gap: 0; border: 3px solid #D8FF00; border-radius: 30px; overflow: hidden; margin-bottom: 40px; }
    .stat-item { flex: 1; padding: 24px; text-align: center; border-right: 3px solid #D8FF00; }
    .stat-item:last-child { border-right: none; }
    .stat-num { font-size: 36px; font-weight: 900; color: #D8FF00; line-height: 1; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: #555; margin-top: 4px; }
    .modal-overlay { position: fixed; inset: 0; background: #000000cc; display: flex; align-items: center; justify-content: center; z-index: 100; display: none; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #000; border: 3px solid #D8FF00; border-radius: 30px; padding: 40px; max-width: 380px; width: 90%; text-align: center; }
    .modal-title { font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .modal-sub { font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #D8FF00; color: #000; padding: 16px 32px; border-radius: 30px; font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; transition: transform 0.3s ease; z-index: 999; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .empty { text-align: center; padding: 60px 20px; color: #333; }
    .empty-icon { font-size: 60px; margin-bottom: 20px; }
    .empty-text { font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .empty-sub { font-size: 13px; letter-spacing: 2px; margin-bottom: 30px; }
    .btn-row { display: flex; gap: 14px; flex-wrap: wrap; }
    @media (max-width: 600px) { .logo { font-size: 30px; } .question-text { font-size: 22px; } .score-big { font-size: 70px; } .stats-strip { flex-direction: column; } .stat-item { border-right: none; border-bottom: 3px solid #D8FF00; } .stat-item:last-child { border-bottom: none; } }
  </style>
</head>
<body>

<div class="page active" id="page-home">
  <div style="padding-top: 40px;">
    <div class="logo">Quiz<span>App</span></div>
    <div class="tagline">Проходи и создавай викторины</div>
    <div class="stats-strip">
      <div class="stat-item">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Викторин</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="stat-played">0</div>
        <div class="stat-label">Сыграно</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="stat-questions">0</div>
        <div class="stat-label">Вопросов</div>
      </div>
    </div>
    <div style="margin-bottom: 30px;">
      <button class="btn btn-acid" onclick="showPage('page-create')">+ Создать викторину</button>
    </div>
    <div class="section-title">Каталог викторин</div>
    <div id="quiz-list"></div>
  </div>
</div>

<div class="page" id="page-create">
  <div style="padding-top: 40px;">
    <div class="nav">
      <button class="back-btn" onclick="showPage('page-home')">← Назад</button>
      <div class="logo" style="margin-bottom:0; font-size: 28px;">Новая <span>Викторина</span></div>
    </div>
    <div class="card" style="margin-bottom: 30px;">
      <div class="q-num">Название викторины</div>
      <input type="text" id="quiz-title-input" placeholder="Введи название..." maxlength="60" />
    </div>
    <div class="section-title">Вопросы</div>
    <div id="questions-list"></div>
    <button class="btn btn-outline" onclick="addQuestion()" style="margin-bottom: 30px;">+ Добавить вопрос</button>
    <div style="height: 20px;"></div>
    <button class="btn btn-acid" onclick="saveQuiz()" style="width: 100%; padding: 22px;">Сохранить викторину</button>
    <div style="height: 60px;"></div>
  </div>
</div>

<div class="page" id="page-play">
  <div style="padding-top: 40px;">
    <div class="nav">
      <button class="back-btn" onclick="quitQuiz()">← Выйти</button>
      <div style="font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: #555;" id="play-quiz-name"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
    </div>
    <div class="question-counter" id="question-counter"></div>
    <div class="question-text" id="question-text"></div>
    <div id="answers-list"></div>
    <div style="margin-top: 30px;">
      <button class="btn btn-acid" id="next-btn" onclick="nextQuestion()" style="display:none; width: 100%; padding: 22px;">Следующий вопрос →</button>
    </div>
  </div>
</div>

<div class="page" id="page-result">
  <div style="padding-top: 60px; text-align: center;">
    <div class="question-counter" id="result-quiz-name"></div>
    <div class="score-big" id="result-score"></div>
    <div class="score-label">Правильных ответов</div>
    <div class="result-msg" id="result-msg"></div>
    <div style="color: #555; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 50px;" id="result-sub"></div>
    <div class="btn-row" style="justify-content: center;">
      <button class="btn btn-acid" onclick="replayQuiz()">Играть снова</button>
      <button class="btn btn-outline" onclick="showPage('page-home')">На главную</button>
    </div>
    <div style="margin-top: 50px; text-align: left;">
      <div class="section-title">Разбор ответов</div>
      <div id="result-details"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="delete-modal">
  <div class="modal-box">
    <div class="modal-title">Удалить викторину?</div>
    <div class="modal-sub">Это действие нельзя отменить</div>
    <div class="btn-row" style="justify-content: center;">
      <button class="btn btn-danger" onclick="confirmDelete()">Удалить</button>
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var allQuizzes = []
var playedCount = 0
var deleteTargetId = null
var currentQuiz = null
var currentQIndex = 0
var correctCount = 0
var answered = false
var userAnswers = []
var createQuestions = []

function loadData() {
  var saved = localStorage.getItem('quizapp-quizzes')
  if (saved) {
    allQuizzes = JSON.parse(saved)
  } else {
    allQuizzes = [
      {
        id: 'q1',
        title: 'Наука и природа',
        questions: [
          { text: 'Какая планета самая большая в солнечной системе?', options: ['Земля', 'Сатурн', 'Юпитер', 'Нептун'], correct: 2 },
          { text: 'Сколько костей в теле взрослого человека?', options: ['106', '206', '306', '256'], correct: 1 },
          { text: 'Что такое фотосинтез?', options: ['Дыхание животных', 'Преобразование света в энергию растениями', 'Процесс пищеварения', 'Тип размножения'], correct: 1 }
        ]
      },
      {
        id: 'q2',
        title: 'Мировая география',
        questions: [
          { text: 'Какая страна самая большая по площади?', options: ['США', 'Китай', 'Россия', 'Канада'], correct: 2 },
          { text: 'В какой стране находится Эйфелева башня?', options: ['Италия', 'Испания', 'Германия', 'Франция'], correct: 3 },
          { text: 'Какой океан самый большой?', options: ['Атлантический', 'Тихий', 'Индийский', 'Северный Ледовитый'], correct: 1 },
          { text: 'Столица Австралии?', options: ['Сидней', 'Мельбурн', 'Брисбен', 'Канберра'], correct: 3 }
        ]
      }
    ]
    saveData()
  }
  var ps = localStorage.getItem('quizapp-played')
  if (ps) playedCount = parseInt(ps)
}

function saveData() {
  localStorage.setItem('quizapp-quizzes', JSON.stringify(allQuizzes))
}

function savePlayedCount() {
  localStorage.setItem('quizapp-played', String(playedCount))
}

function showPage(id) {
  var pages = document.querySelectorAll('.page')
  pages.forEach(function(p) { p.classList.remove('active') })
  document.getElementById(id).classList.add('active')
  window.scrollTo(0, 0)
  if (id === 'page-home') renderHome()
  if (id === 'page-create') renderCreatePage()
}

function renderHome() {
  var totalQ = 0
  allQuizzes.forEach(function(q) { totalQ += q.questions.length })
  document.getElementById('stat-total').textContent = allQuizzes.length
  document.getElementById('stat-played').textContent = playedCount
  document.getElementById('stat-questions').textContent = totalQ
  var list = document.getElementById('quiz-list')
  list.innerHTML = ''
  if (allQuizzes.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">Викторин пока нет</div><div class="empty-sub">Создай первую!</div></div>'
    return
  }
  allQuizzes.forEach(function(quiz) {
    var card = document.createElement('div')
    card.className = 'quiz-card'
    card.innerHTML = '<div onclick="startQuiz(\'' + quiz.id + '\')" style="flex:1; cursor:pointer;"><div class="quiz-card-title">' + quiz.title + '</div><div class="quiz-card-meta">' + quiz.questions.length + ' вопросов</div></div><div style="display:flex; align-items:center;"><div class="quiz-card-arrow" onclick="startQuiz(\'' + quiz.id + '\')" style="cursor:pointer;">→</div><button class="quiz-card-del" onclick="askDelete(\'' + quiz.id + '\')" title="Удалить">✕</button></div>'
    list.appendChild(card)
  })
}

function askDelete(id) {
  deleteTargetId = id
  document.getElementById('delete-modal').classList.add('open')
}

function closeModal() {
  deleteTargetId = null
  document.getElementById('delete-modal').classList.remove('open')
}

function confirmDelete() {
  allQuizzes = allQuizzes.filter(function(q) { return q.id !== deleteTargetId })
  saveData()
  closeModal()
  renderHome()
  showToast('Викторина удалена')
}

function renderCreatePage() {
  document.getElementById('quiz-title-input').value = ''
  createQuestions = []
  renderQuestionsList()
  addQuestion()
}

function addQuestion() {
  createQuestions.push({ text: '', options: ['', '', '', ''], correct: 0 })
  renderQuestionsList()
  setTimeout(function() { window.scrollTo(0, document.body.scrollHeight) }, 50)
}

function removeQuestion(idx) {
  if (createQuestions.length <= 1) { showToast('Нужен хотя бы 1 вопрос'); return }
  createQuestions.splice(idx, 1)
  renderQuestionsList()
}

function renderQuestionsList() {
  var container = document.getElementById('questions-list')
  container.innerHTML = ''
  createQuestions.forEach(function(q, qi) {
    var block = document.createElement('div')
    block.className = 'q-block'
    var html = '<div class="q-num" style="display:flex; justify-content:space-between; align-items:center;"><span>Вопрос ' + (qi + 1) + '</span>' + (createQuestions.length > 1 ? '<button onclick="removeQuestion(' + qi + ')" style="background:none;border:none;color:#ff4444;cursor:pointer;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:2px;">Удалить</button>' : '') + '</div>'
    html += '<input type="text" placeholder="Текст вопроса..." value="' + esc(q.text) + '" oninput="createQuestions[' + qi + '].text = this.value" style="margin-bottom: 18px;" />'
    html += '<div class="q-num" style="margin-top:4px;">Варианты ответа</div>'
    q.options.forEach(function(opt, oi) {
      html += '<div class="option-row"><button class="correct-btn ' + (q.correct === oi ? 'selected' : '') + '" onclick="setCorrect(' + qi + ',' + oi + ')">' + (q.correct === oi ? '✓' : oi + 1) + '</button><input type="text" placeholder="Вариант ' + (oi + 1) + '..." value="' + esc(opt) + '" oninput="createQuestions[' + qi + '].options[' + oi + '] = this.value" /></div>'
    })
    block.innerHTML = html
    container.appendChild(block)
  })
}

function setCorrect(qi, oi) {
  createQuestions[qi].correct = oi
  renderQuestionsList()
}

function esc(str) {
  return str.replace(/"/g, '&quot;').replace(/</g, '&lt;')
}

function saveQuiz() {
  var title = document.getElementById('quiz-title-input').value.trim()
  if (!title) { showToast('Введи название викторины'); return }
  var ok = true
  createQuestions.forEach(function(q, qi) {
    if (!q.text.trim()) { showToast('Заполни текст вопроса ' + (qi + 1)); ok = false }
    q.options.forEach(function(o, oi) {
      if (!o.trim()) { showToast('Заполни вариант ' + (oi + 1) + ' в вопросе ' + (qi + 1)); ok = false }
    })
  })
  if (!ok) return
  var newQuiz = { id: 'q' + Date.now(), title: title, questions: JSON.parse(JSON.stringify(createQuestions)) }
  allQuizzes.unshift(newQuiz)
  saveData()
  showToast('Викторина сохранена!')
  showPage('page-home')
}

function startQuiz(id) {
  currentQuiz = null
  allQuizzes.forEach(function(q) { if (q.id === id) currentQuiz = q })
  if (!currentQuiz) return
  currentQIndex = 0
  correctCount = 0
  answered = false
  userAnswers = []
  document.getElementById('play-quiz-name').textContent = currentQuiz.title
  showPage('page-play')
  renderQuestion()
}

function renderQuestion() {
  var q = currentQuiz.questions[currentQIndex]
  var total = currentQuiz.questions.length
  answered = false
  var pct = (currentQIndex / total) * 100
  document.getElementById('progress-bar').style.width = pct + '%'
  document.getElementById('question-counter').textContent = 'Вопрос ' + (currentQIndex + 1) + ' из ' + total
  document.getElementById('question-text').textContent = q.text
  var list = document.getElementById('answers-list')
  list.innerHTML = ''
  q.options.forEach(function(opt, oi) {
    var btn = document.createElement('button')
    btn.className = 'answer-option'
    btn.textContent = opt
    btn.onclick = function() { pickAnswer(oi) }
    list.appendChild(btn)
  })
  document.getElementById('next-btn').style.display = 'none'
}

function pickAnswer(oi) {
  if (answered) return
  answered = true
  var q = currentQuiz.questions[currentQIndex]
  var btns = document.querySelectorAll('.answer-option')
  userAnswers.push({ chosen: oi, correct: q.correct })
  if (oi === q.correct) {
    correctCount++
    btns[oi].classList.add('correct')
  } else {
    btns[oi].classList.add('wrong')
    btns[q.correct].classList.add('correct')
  }
  btns.forEach(function(b) { b.classList.add('disabled') })
  var nextBtn = document.getElementById('next-btn')
  if (currentQIndex + 1 < currentQuiz.questions.length) {
    nextBtn.textContent = 'Следующий вопрос →'
  } else {
    nextBtn.textContent = 'Посмотреть результат →'
  }
  nextBtn.style.display = 'block'
}

function nextQuestion() {
  currentQIndex++
  if (currentQIndex >= currentQuiz.questions.length) {
    showResult()
  } else {
    renderQuestion()
    window.scrollTo(0, 0)
  }
}

function quitQuiz() {
  showPage('page-home')
}

function showResult() {
  playedCount++
  savePlayedCount()
  var total = currentQuiz.questions.length
  var pct = Math.round((correctCount / total) * 100)
  document.getElementById('result-quiz-name').textContent = currentQuiz.title
  document.getElementById('result-score').textContent = correctCount + '/' + total
  var msg = ''
  var sub = ''
  if (pct === 100) { msg = 'Идеально! 🔥'; sub = 'Ты знаешь всё!' }
  else if (pct >= 75) { msg = 'Отлично! ✨'; sub = 'Почти идеально' }
  else if (pct >= 50) { msg = 'Неплохо! 👍'; sub = 'Можно лучше' }
  else if (pct >= 25) { msg = 'Стараешься! 💪'; sub = 'Повтори материал' }
  else { msg = 'В следующий раз! 😅'; sub = 'Попробуй ещё раз' }
  document.getElementById('result-msg').textContent = msg
  document.getElementById('result-sub').textContent = sub + ' — ' + pct + '%'
  var details = document.getElementById('result-details')
  details.innerHTML = ''
  currentQuiz.questions.forEach(function(q, i) {
    var ua = userAnswers[i]
    var isRight = ua.chosen === ua.correct
    var block = document.createElement('div')
    block.style.cssText = 'border: 3px solid ' + (isRight ? '#D8FF00' : '#ff4444') + '; border-radius: 20px; padding: 22px 26px; margin-bottom: 14px; text-align: left;'
    block.innerHTML = '<div style="font-size:11px;text-transform:uppercase;letter-spacing:3px;color:' + (isRight ? '#D8FF00' : '#ff4444') + ';margin-bottom:10px;">' + (isRight ? '✓ Верно' : '✕ Неверно') + ' — Вопрос ' + (i + 1) + '</div><div style="font-size:16px;font-weight:900;text-transform:uppercase;margin-bottom:12px;">' + q.text + '</div>' + (!isRight ? '<div style="font-size:13px;color:#ff4444;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Твой ответ: ' + q.options[ua.chosen] + '</div>' : '') + '<div style="font-size:13px;color:#D8FF00;text-transform:uppercase;letter-spacing:1px;">Правильно: ' + q.options[ua.correct] + '</div>'
    details.appendChild(block)
  })
  document.getElementById('progress-bar').style.width = '100%'
  showPage('page-result')
}

function replayQuiz() {
  if (currentQuiz) startQuiz(currentQuiz.id)
}

function showToast(msg) {
  var t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(function() { t.classList.remove('show') }, 2500)
}

loadData()
renderHome()
document.getElementById('delete-modal').addEventListener('click', function(e) { if (e.target === this) closeModal() })
</script>
</body>
</html>
